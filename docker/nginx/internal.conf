# =============================================================================
# H-Vault — in-container Nginx (the stack's single serving surface)
# =============================================================================
# Baked into the `web` image at /etc/nginx/conf.d/default.conf (docker/Dockerfile),
# so it is included inside the stock image's `http {}` block — `map` and
# `resolver` are therefore valid at this level.
#
# Compose publishes exactly ONE host port for the whole stack:
# 127.0.0.1:${HVAULT_HTTP_PORT}. In production the host's system Nginx
# (docker/nginx/system.docker.example.conf) terminates TLS and reverse-proxies to
# it. This server always LISTENS on 8080 inside the container regardless of which
# host port is published, so the published port can be changed in
# docker-compose.yml without rebuilding this image.
#
# --- Routing contract --------------------------------------------------------
#   /api/*             -> the Express API (hvault-app:5000)
#   /assets/*          -> content-hashed JS/CSS, from disk, cached immutably
#   /sw.js             -> the PWA service worker, from disk, never cached
#   /                  -> PROXIED to Express  (see below)
#   any other real file-> from disk (favicons, manifest, PWA icons), revalidated
#   anything else      -> PROXIED to Express, which returns the SPA shell, so a
#                         deep link like /vault/<id> or /settings/backup resolves
#
# --- Why the HTML document is always proxied, never served from disk ----------
# Every security header this app depends on — the Content-Security-Policy and its
# per-request, crypto-random nonce, X-Frame-Options, Referrer-Policy, COOP — is
# emitted by helmet inside Express. An HTML document served straight off this
# disk would carry NONE of them, turning /index.html into a header-free bypass of
# the app's entire CSP. So the document is proxied and helmet stays its single
# owner. To make that structural rather than merely configured, the document root
# below is a directory this repo owns outright and index.html is DELETED from it
# (docker/Dockerfile, `web-root` stage): there is no HTML file here for Nginx to
# serve even if a future edit to `try_files` tried to. Only static sub-resources
# are served locally, and they get `nosniff`.
#
# One honest caveat, which predates this layer and is not introduced by it: the
# SPA is a PWA. `vite.config.ts` precaches index.html into the service worker, so
# a RETURNING visitor is served the document out of Cache Storage without touching
# the network at all, until they accept the update prompt (`registerType:
# 'prompt'`). What they get is the whole cached Response — body AND the CSP header
# helmet attached to it — so it stays internally consistent and is never
# header-free; it is simply the previous release's policy. The practical effect is
# that a CSP change reaches an installed client a deploy late, and the nonce is
# frozen for that document's cache lifetime rather than per-request. The nonce is
# currently inert anyway (the built index.html carries no inline script, so
# `script-src 'self'` is what actually admits the bundle) — but if an inline script
# is ever added, that staleness starts to matter, and the precache would need
# `globPatterns` to drop `html`, at the cost of offline navigation.

# Honor the outer proxy's scheme when it terminates TLS: on this hop the request
# arrives as plain http, but X-Forwarded-Proto says https. Fall back to this hop's
# own scheme when the header is absent (i.e. the published port was hit directly).
map $http_x_forwarded_proto $hvault_forwarded_proto {
    default $scheme;
    '~.'    $http_x_forwarded_proto;
}

# Docker's embedded DNS server. Every proxy_pass below goes through a VARIABLE
# rather than a static `upstream` block, and that is deliberate on two counts:
#
#   * Re-resolution. Nginx resolves a hostname in an `upstream` block exactly
#     once, when it loads its configuration, and then holds that address forever.
#     Recreate only the app container — `docker compose up -d --build` after an
#     app-only change does exactly that, and leaves this container untouched — and
#     it comes back on a new IP while Nginx keeps proxying to the dead one. Every
#     request 502s until someone thinks to restart Nginx. Resolving through a
#     variable defers the lookup to request time and honours the TTL below, so the
#     new address is picked up on its own.
#
#   * Startup order. A static upstream also makes Nginx REFUSE TO START when the
#     name does not resolve yet ("host not found in upstream"), which turns a slow
#     app boot into a crash loop and makes the image impossible to `nginx -t` on
#     its own, in CI, outside the compose network.
#
# The cost is the upstream keepalive pool, which a variable proxy_pass cannot use:
# each proxied request opens a fresh TCP connection to the app. Over a container
# bridge that is a sub-millisecond handshake, and it buys a proxy that cannot be
# left pointing at a container that no longer exists.
#
# ipv6=off because Docker's resolver answers AAAA queries with NXDOMAIN, which
# Nginx would otherwise log as a resolution failure on every lookup.
resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    # A document root this repo owns outright — NOT the base image's
    # /usr/share/nginx/html, which already ships nginx's stock index.html. Serving
    # from there would answer /index.html with the "Welcome to nginx!" page (and
    # none of helmet's headers) instead of letting it fall through to Express.
    root  /srv/hvault;

    # Do not advertise the Nginx version in responses or error pages.
    server_tokens off;

    # Ceiling for request bodies. It MUST stay ABOVE the app's own largest route
    # limit (30 MB, applied by the route-level body parsers on /backup/restore and
    # /vault/items/bulk-reencrypt) so an oversized payload is rejected by the
    # application — with its structured JSON error — instead of being cut off here
    # with an opaque Nginx 413. The outer Nginx must allow at least as much.
    client_max_body_size 32m;
    client_body_timeout  120s;

    # gzip is on for STATIC assets and explicitly OFF on every PROXIED response —
    # the API (`gzip off` in /api/) and the HTML document (`gzip off` in `= /` and
    # `@app`). That is deliberate: compressing a response that mixes a secret (a
    # CSRF token, a bearer token, the CSP nonce) with attacker-influenced content is
    # the precondition for a BREACH-style compression side-channel.
    #
    # The HTML locations need their own `gzip off` and are NOT covered by gzip_types:
    # nginx compresses `text/html` unconditionally, whatever gzip_types says. Nothing
    # attacker-controlled is reflected into the shell today, so this is prophylactic —
    # but it makes the invariant true rather than merely intended, which matters the
    # day someone reflects a query parameter into it.
    #
    # API payloads here are overwhelmingly base64 ciphertext and the shell is ~1 KB,
    # so the whole trade costs almost nothing and removes the entire class of bug.
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary       on;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        application/xml
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    # ----------------------------------------------------------------- API ----
    location /api/ {
        # The variable is what forces per-request re-resolution (see `resolver`
        # above). With no URI part after the host, Nginx forwards the original
        # request URI unchanged.
        set        $hvault_app hvault-app:5000;
        proxy_pass http://$hvault_app;
        include    /etc/nginx/hvault/proxy_app.conf;

        # See the gzip note above: never compress API responses.
        gzip off;

        # Stream large bodies (30 MB vault-key rotations and backup restores)
        # straight to the app instead of spooling them to a temp file first. This
        # container's filesystem is read-only with only a small tmpfs, so writing
        # a payload that size to disk is not an option anyway.
        proxy_request_buffering off;

        # A full-vault key rotation or backup restore re-encrypts and rewrites
        # every item server-side and can legitimately run for minutes.
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # -------------------------------------------------------- static assets ----
    # Vite emits content-hashed, immutable filenames here, so they are cacheable
    # forever: a new deploy changes the content, hence the hash, hence the URL.
    #
    # The `@app` fallback is a safety net, not a normal path. These files come
    # from the very same build stage the app image uses, so a miss should be
    # impossible; if one ever occurred, falling through to the app (which carries
    # an identical copy) degrades gracefully instead of white-screening the SPA.
    location /assets/ {
        add_header Cache-Control          "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        access_log off;
        try_files  $uri @app;
    }

    # The service worker must never be cached, or a deploy can never reach a
    # browser that already installed the previous one.
    location = /sw.js {
        add_header Cache-Control          "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        # The service worker is a SCRIPT. Served from Express it inherited helmet's
        # CSP; served from disk it would carry none at all, leaving the worker's
        # execution context unconstrained. 'self' is what it needs (it importScripts
        # its workbox chunk and fetches same-origin assets) and nothing more.
        add_header Content-Security-Policy "default-src 'self'" always;
        try_files  $uri @app;
    }

    # ------------------------------------------------------- HTML document ----
    # The site root. `try_files` cannot express "never look at disk" for a bare
    # "/" (Nginx would resolve it against the directory and its index), so the
    # root is proxied explicitly.
    location = / {
        set        $hvault_app hvault-app:5000;
        proxy_pass http://$hvault_app;
        include    /etc/nginx/hvault/proxy_app.conf;
        # See the gzip note above: nginx gzips text/html regardless of gzip_types.
        gzip off;
    }

    # ------------------------------------------------------------- the rest ---
    # A real file on disk (favicon.svg, favicon.ico, manifest.webmanifest,
    # pwa-*.png, logo.svg, workbox-*.js) is served from here. Their names do not
    # change between deploys, so they must be revalidated rather than cached hard.
    # Everything else — /index.html included, since it is deliberately absent from
    # this image — falls through to Express and comes back as the SPA shell.
    location / {
        add_header Cache-Control          "public, max-age=0, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        try_files  $uri @app;
    }

    location @app {
        set        $hvault_app hvault-app:5000;
        proxy_pass http://$hvault_app;
        include    /etc/nginx/hvault/proxy_app.conf;
        # See the gzip note above: nginx gzips text/html regardless of gzip_types.
        gzip off;
    }
}
