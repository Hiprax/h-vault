# =============================================================================
# H-Vault — outer / system-level Nginx  (PM2 deployment, no Docker)
# =============================================================================
# Use this variant ONLY if you run H-Vault with PM2 (`pm2 start ecosystem.config.cjs
# --env production`) instead of the Docker Compose stack. Without Docker there is no
# internal Nginx: Express itself serves the SPA and the API on PORT (5000), so this
# file proxies straight to it.
#
#   internet ──▶ :443 (this file) ──▶ 127.0.0.1:5000  (node, via PM2)
#
# It is otherwise identical to system.docker.example.conf. The two differences are
# load-bearing:
#
#   1. The upstream is 127.0.0.1:5000 (Express) rather than 127.0.0.1:8080 (the
#      stack's Nginx).
#   2. TRUST_PROXY=1, not 2 — there is exactly ONE proxy in front of Express here.
#      Express trusts the last N entries of X-Forwarded-For, so leaving it at 2
#      would let any client spoof its own IP by sending the header, defeating the
#      IP-keyed rate limits and poisoning the audit log.
#
# Also note that with PM2 there is no Nginx serving the bundle from disk, so gzip
# is enabled below for the static assets Express hands back (it ships no compression
# middleware of its own). It stays OFF for /api — see the note there.
#
# Install exactly as for the Docker variant:
#   sudo cp docker/nginx/system.pm2.example.conf /etc/nginx/sites-available/hvault.conf
#   sudo ln -s /etc/nginx/sites-available/hvault.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen      80;
    listen      [::]:80;
    server_name vault.example.com;

    # location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name vault.example.com;

    # !! EDIT BEFORE ENABLING !! Placeholders — `nginx -t` fails until these are real.
    ssl_certificate     /etc/letsencrypt/live/vault.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.example.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    server_tokens off;

    # HSTS is owned here (see system.docker.example.conf for the full header
    # ownership contract). helmet's own HSTS is stripped so there is exactly one.
    proxy_hide_header Strict-Transport-Security;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 32m;
    client_body_timeout  120s;

    # --- Static assets ---------------------------------------------------------
    # Express serves the bundle with express.static; these files are content-hashed
    # and immutable, so cache them hard. Compressing them is safe and worthwhile
    # (they are JS/CSS, and Express applies no compression itself).
    location /assets/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        # HSTS has to be REPEATED here, not just set at the server level. Nginx's
        # add_header and proxy_hide_header are inherited from the enclosing block
        # ONLY while the current block declares none of its own — and this location
        # declares both (for Cache-Control just above). Without these two lines it
        # therefore inherits NEITHER the server-level HSTS header NOR the
        # proxy_hide_header that strips helmet's, so asset responses would silently
        # ship helmet's HSTS value instead of the one chosen here, contradicting the
        # single-authoritative-value contract this file sets out.
        proxy_hide_header Strict-Transport-Security;
        add_header Strict-Transport-Security "max-age=31536000" always;

        gzip            on;
        gzip_comp_level 5;
        gzip_min_length 1024;
        gzip_proxied    any;
        gzip_vary       on;
        gzip_types application/javascript text/javascript text/css image/svg+xml application/wasm;
    }

    # --- Everything else (API + the SPA shell) --------------------------------
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";

        # OFF for the API: compressing a response that mixes a secret (CSRF token,
        # bearer token) with attacker-influenced content is the precondition for a
        # BREACH-style compression side-channel, and H-Vault's API payloads are
        # base64 ciphertext that barely compresses anyway.
        gzip off;

        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_request_buffering off;
    }
}
