# =============================================================================
# H-Vault — outer / system-level Nginx  (Docker Compose deployment)
# =============================================================================
# This is an EXAMPLE for the HOST's system Nginx — the one running on the machine,
# outside Docker. It terminates TLS and reverse-proxies everything to the single
# loopback port the compose stack publishes: 127.0.0.1:${HVAULT_HTTP_PORT}, 8080 by
# default. The Nginx INSIDE the stack (docker/nginx/internal.conf) does the actual
# routing — SPA assets, /api, the HTML shell — so this layer stays deliberately
# thin: TLS, HSTS, HTTP->HTTPS, and one proxy_pass.
#
#   internet ──▶ :443 (this file) ──▶ 127.0.0.1:8080 ──▶ hvault-nginx ──▶ hvault-app
#
# --- Install (Debian / Ubuntu) -----------------------------------------------
#   sudo cp docker/nginx/system.docker.example.conf /etc/nginx/sites-available/hvault.conf
#   sudo ln -s /etc/nginx/sites-available/hvault.conf /etc/nginx/sites-enabled/
#   # edit server_name + the ssl_certificate paths (see below), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# --- Before you enable it ----------------------------------------------------
#  1. Replace vault.example.com with your domain, everywhere it appears.
#  2. Point the ssl_certificate paths at real certificates. The paths below are
#     PLACEHOLDERS; `nginx -t` WILL FAIL until you fix them. With certbot:
#         sudo certbot certonly --nginx -d vault.example.com
#  3. In the stack's .env set the public URL — the app refuses to boot in
#     production with a non-HTTPS CORS_ORIGIN, by design:
#         APP_URL=https://vault.example.com
#         CORS_ORIGIN=https://vault.example.com
#  4. Leave TRUST_PROXY_HOPS at its default of 2. There are exactly two proxies in
#     front of Express with this file in place — THIS Nginx, then the stack's — and
#     Express trusts the last N entries of X-Forwarded-For. Set it to anything
#     higher and a client can spoof its own IP (defeating the IP-keyed rate limits
#     and poisoning the audit log); set it lower and every request is attributed to
#     the proxy. If you ever drop this file and expose the loopback port directly,
#     it becomes 1.

# Keepalive pool to the compose stack's single published port. This MUST match the
# port compose publishes — 127.0.0.1:${HVAULT_HTTP_PORT} from the stack's .env, 8080
# when unset. If you set HVAULT_HTTP_PORT=3100, change the 8080 below to match.
#
# A named upstream is safe HERE, unlike inside the stack: this address is a fixed
# loopback port, not a container name whose IP changes when the container is
# recreated, so Nginx resolving it once at startup is correct.
upstream hvault_stack {
    server 127.0.0.1:8080;
    keepalive 32;
}

# --- HTTP: redirect to HTTPS, and nothing else -------------------------------
server {
    listen      80;
    listen      [::]:80;
    server_name vault.example.com;

    # Let certbot answer ACME http-01 challenges over plain HTTP while everything
    # else is redirected. Uncomment and point at your webroot if you renew that way.
    # location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: terminate TLS, proxy to the stack --------------------------------
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name vault.example.com;

    # --- TLS -----------------------------------------------------------------
    # !! EDIT BEFORE ENABLING !! These paths are placeholders for the example
    # domain. Replace them with your real fullchain.pem / privkey.pem.
    ssl_certificate     /etc/letsencrypt/live/vault.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.example.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP stapling — uncomment once you have the issuer chain on disk.
    # ssl_stapling            on;
    # ssl_stapling_verify     on;
    # ssl_trusted_certificate /etc/letsencrypt/live/vault.example.com/chain.pem;

    server_tokens off;

    # --- Security header ownership -------------------------------------------
    # Headers are owned by exactly one layer each, so nothing is duplicated (a
    # second, conflicting X-Frame-Options or Content-Security-Policy is worse than
    # none — browsers may discard both):
    #
    #   * Express + helmet own the document headers: Content-Security-Policy with
    #     its per-request nonce, X-Frame-Options, X-Content-Type-Options,
    #     Referrer-Policy, Cross-Origin-Opener-Policy. Every HTML response and every
    #     API response is proxied through Express, so they always carry them.
    #   * The stack's internal Nginx adds X-Content-Type-Options to the static files
    #     it serves from disk.
    #   * THIS layer owns HSTS, which only becomes meaningful once TLS terminates.
    #
    # helmet also emits an HSTS header of its own. `proxy_hide_header` strips it so
    # this one is the only Strict-Transport-Security the client ever sees — a single
    # authoritative value, set where TLS actually lives.
    proxy_hide_header Strict-Transport-Security;
    # Safe as written: this host only, one year. Add `; includeSubDomains` ONLY once
    # every subdomain of this domain is served over HTTPS for the full max-age, and
    # `; preload` ONLY if you intend to submit to the browser preload list. Both are
    # very hard to undo — browsers cache the policy for the full max-age.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # --- Request bodies -------------------------------------------------------
    # Must be >= the stack's internal limit (32m). H-Vault's largest legitimate
    # request bodies are the 30 MB backup restore and vault-key rotation payloads;
    # the app enforces the real ceiling and returns a structured JSON error, so
    # leave headroom here rather than cutting the request off with a bare 413.
    client_max_body_size 32m;
    client_body_timeout  120s;

    # --- Compression ----------------------------------------------------------
    # Deliberately OFF at this layer. The stack's internal Nginx already gzips the
    # static bundle (and its responses pass through here untouched), and it very
    # deliberately does NOT compress API responses: gzipping a response that mixes a
    # secret (a CSRF token, a bearer token) with attacker-influenced content is the
    # precondition for a BREACH-style compression side-channel. Turning gzip on here
    # would re-introduce exactly what that avoids, for almost no gain — the API's
    # payloads are base64 ciphertext, which barely compresses.
    gzip off;

    # --- Reverse proxy: everything to the stack ------------------------------
    # One location is enough: the stack's internal Nginx splits SPA / assets / API
    # behind this port. H-Vault opens no WebSocket, so no upgrade handling is needed.
    location / {
        proxy_pass         http://hvault_stack;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # The app is behind TLS termination; without this it would believe every
        # request arrived over plain http.
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        # Empty Connection header keeps the upstream connection alive.
        proxy_set_header   Connection        "";

        # A full-vault key rotation or a backup restore re-encrypts and rewrites
        # every item server-side and can legitimately run for minutes.
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Stream large uploads (the 30 MB restore/rotation bodies) straight through
        # rather than spooling the whole body to disk first.
        proxy_request_buffering off;
    }
}
