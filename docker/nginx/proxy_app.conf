# =============================================================================
# H-Vault — shared proxy directives for every location that forwards to the app
# =============================================================================
# Included (not auto-loaded) by docker/nginx/internal.conf. It is installed at
# /etc/nginx/hvault/ rather than /etc/nginx/conf.d/ on purpose: the stock image's
# nginx.conf does `include /etc/nginx/conf.d/*.conf` inside http{}, which would
# pull this fragment into the http context as well and apply these headers
# globally. Keeping it outside that glob means it takes effect only where it is
# explicitly included.

proxy_http_version 1.1;

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
# Appends this hop's client address to any inbound chain. Combined with the outer
# host Nginx this yields "<real client>, <host gateway>", which Express resolves
# to the real client IP with TRUST_PROXY=2 (see docker-compose.yml). The hop count
# must match the number of proxies EXACTLY, or a client-supplied X-Forwarded-For
# entry is trusted and req.ip becomes spoofable.
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $hvault_forwarded_proto;
proxy_set_header X-Forwarded-Host  $host;

# Strip any inbound Connection header (and the hop-by-hop semantics it carries)
# rather than forwarding it upstream. NOTE: this does NOT give us a keepalive pool
# here — that needs a named `upstream` block, which internal.conf deliberately does
# not use, because a static upstream would pin Nginx to the app's IP at config-load
# time and 502 forever once the container is recreated. Keepalive is the price paid
# for that, knowingly. (The OUTER nginx does have a real pool: its upstream is a
# fixed loopback port that never moves.)
proxy_set_header Connection        "";

proxy_connect_timeout 10s;

# Never spill a proxied response to a temp file. The Nginx container runs on a
# READ-ONLY root filesystem with only a small tmpfs, and a large response — a
# vault export or a backup download can be tens of megabytes — would otherwise be
# written to disk and fail with ENOSPC. Zero here keeps small responses buffered
# in memory (so the upstream connection is released immediately, as usual) and
# makes Nginx stream anything larger straight through to the client instead.
proxy_buffers           16 16k;
proxy_busy_buffers_size 32k;
proxy_max_temp_file_size 0;
