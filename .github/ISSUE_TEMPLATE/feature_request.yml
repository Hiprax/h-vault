name: Feature request
description: Suggest a capability or an improvement.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem, not just the solution you have in mind. What are you unable to do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
    validations:
      required: false

  - type: checkboxes
    id: constraints
    attributes:
      label: Does it hold up against the architecture?
      description: H-Vault is zero-knowledge. Anything that would require the server to see plaintext vault data, the master password, or a key derived from it is out of scope by design.
      options:
        - label: This does not require the server to see any plaintext vault data or key material.
          required: true
