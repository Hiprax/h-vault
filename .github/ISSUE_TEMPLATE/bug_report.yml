name: Bug report
description: Something is broken. Not for security vulnerabilities — see SECURITY.md.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        **Security vulnerability? Stop.** Do not file it here — report it privately:
        https://github.com/Hiprax/h-vault/security/advisories/new

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Sign in and open the vault
        2. Create a card item with ...
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: The release tag, or the commit SHA you are running.
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: How is it deployed?
      options:
        - Docker Compose stack (docker-compose.yml)
        - PM2
        - Local development (npm run dev)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser and version, host OS, Node version if relevant. Anything unusual about the configuration.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Server logs, browser console output, or the response body. **Redact secrets, tokens and vault data before pasting.**
      render: shell
    validations:
      required: false
