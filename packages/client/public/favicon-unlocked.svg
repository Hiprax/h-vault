<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open shackle: closed shackle rotated open on its left hinge -->
  <g transform="rotate(-32 196 220)">
    <path d="M196 220V176c0-33.1 26.9-60 60-60s60 26.9 60 60v44" fill="none" stroke="url(#lock)" stroke-width="28" stroke-linecap="round"/>
  </g>
  <!-- Lock body -->
  <rect x="168" y="220" width="176" height="140" rx="20" fill="url(#lock)"/>
  <!-- Keyhole -->
  <circle cx="256" cy="276" r="20" fill="#15803d"/>
  <rect x="249" y="290" width="14" height="36" rx="7" fill="#15803d"/>
</svg>
